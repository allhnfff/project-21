services:
  app:
    build: .

    container_name: hntstore-app

    restart: always

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production

    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine

    container_name: hntstore-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hntstore

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
